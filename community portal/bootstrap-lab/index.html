<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap 5 Lab</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1 class="text-center my-4">
        Bootstrap 5 Lab Exercises
    </h1>

    
    <h2>Exercise 1.1</h2>

    <button class="btn btn-primary">
        Bootstrap Button
    </button>

    <hr>

    
    <h2>Exercise 3.1</h2>

    <div class="row">
        <div class="col-12 col-md-6 col-lg-4 bg-primary text-white p-3">
            Column 1
        </div>

        <div class="col-12 col-md-6 col-lg-4 bg-success text-white p-3">
            Column 2
        </div>

        <div class="col-12 col-md-12 col-lg-4 bg-danger text-white p-3">
            Column 3
        </div>
    </div>

    <hr>

   
    <h2>Exercise 4.1</h2>

    <div class="row">
        <div class="col-md-3 bg-dark text-white p-3">
            Sidebar
        </div>

        <div class="col-md-9 bg-light p-3">
            Main Content
        </div>
    </div>

    <hr>

    
    <h2>Exercise 8.1</h2>

    <form>
        <input type="text"
               class="form-control mb-3"
               placeholder="Name">

        <input type="email"
               class="form-control mb-3"
               placeholder="Email">

        <button class="btn btn-success">
            Register
        </button>
    </form>

    <hr>

   
    <h2>Exercise 9.1</h2>

    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
